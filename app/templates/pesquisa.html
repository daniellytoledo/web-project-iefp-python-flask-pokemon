{% extends "base.html" %}

{% block title %} Pesquisa {% endblock %}

{% block intro %}
    <p id="p_titulo_01">Pesquisar por "{{ str }}"</p>
{% endblock %}

{% block content %}
    <br>
    <div>
        {% for item in dados %}
            <div class="resultado-pesquisa">
                <a href="{{ url_for('pokemon_cards.detalhes', card_id=item.id) }}">
                    <p class="pesquisa-tit">{{ item.name }}</p>
                    <p class="pesquisa-desc">{{ item.desc|safe }}</p>
                </a>
            </div>
        {% endfor %}
    </div>
{% endblock %}
